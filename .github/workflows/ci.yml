name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── TypeScript ──────────────────────────────────────────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.app.json

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: ESLint
        run: npx eslint src tests

      # ── Tests + Coverage ───────────────────────────────────────────────────
      - name: Vitest (with coverage)
        run: npm test -- --coverage

      # ── Production build ───────────────────────────────────────────────────
      - name: Production build
        run: npm run build

      # ── Bundle size gate (<200 KB) ─────────────────────────────────────────
      - name: Bundle size gate
        run: |
          BUNDLE=$(find dist/assets -name '*.js' | xargs wc -c | tail -1 | awk '{print $1}')
          echo "Bundle size: ${BUNDLE} bytes"
          if [ "$BUNDLE" -gt 204800 ]; then
            echo "❌ Bundle size ${BUNDLE}B exceeds 200 KB limit"
            exit 1
          fi
          echo "✅ Bundle size ${BUNDLE}B is within limit"

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Lighthouse
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      # Baseline: TTI < 2000 ms; >10% regression blocks merge (see constitution §IV)
      # .lighthouserc.json configures the exact budget thresholds
